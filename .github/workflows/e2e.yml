name: E2E

# A real end-to-end run: build the image, bring up the stack, ingest a sample
# PDF and assert that a search finds it AND cites the correct page. Runs the
# full local path (Docling -> arctic embedding -> hybrid search -> reranker ->
# citation); the cloud LLM steps are disabled, so no API key/secret is needed.
#
# Heavier than the lint CI (it downloads ~3 GB of models). It runs on demand, on
# pushes to main, and on PRs that touch the core code (brag/**), the build/e2e
# plumbing or the tests — so changes to the ingest/search path are gated before
# merge, not only after.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "brag/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "requirements.txt"
      - "tests/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "brag/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "requirements.txt"
      - "tests/**"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Create the sample corpus
        run: |
          python -m pip install --quiet fpdf2
          python tests/make_sample_pdf.py
          mkdir -p wissensspeicher/notes wissensspeicher/passages
          # the app container runs as uid 1000 and must write notes/logs to /vault
          chmod -R 777 wissensspeicher

      - name: Build the app image
        run: docker compose build app

      - name: Ingest + search (local only, no API key)
        run: |
          # The persistent app no longer mounts the project dir, so mount the
          # repo into this one-off run just to reach the test script.
          docker compose run --rm \
            -v "$(pwd)":/workspace \
            -e CR_ENABLED=false \
            -e VISION_ENABLED=false \
            -e PYTHONPATH=/app \
            app python /workspace/tests/e2e_smoke.py

      - name: Show app logs on failure
        if: failure()
        run: docker compose logs --no-color || true

      - name: Tear down
        if: always()
        run: docker compose down -v || true
