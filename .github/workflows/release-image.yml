name: Release image

# Build the brag-app image once and publish it to the GitHub Container Registry
# (GHCR) so end users PULL a ready image instead of building it locally — this
# removes the whole "pip install failed on my machine" class of errors and makes
# the first start much faster. Multi-arch so it runs on Intel/AMD (Windows,
# Linux) AND Apple Silicon (arm64) Macs.
#
# Publishes on a version tag (e.g. `git tag v0.3.1 && git push origin v0.3.1`)
# and can also be triggered manually from the Actions tab. IMPORTANT: after the
# first run, set the GHCR package visibility to PUBLIC (repo -> Packages -> brag
# -> Package settings -> Change visibility) so users can pull without a GitHub
# login. The setup scripts fall back to a local build if the image is
# private/missing, so nothing breaks until it is made public.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/brag

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # QEMU lets this amd64 runner also build the arm64 (Apple Silicon) image.
      # NOTE: pin these docker/* actions by commit SHA later to match the rest of
      # the repo (the github-actions Dependabot config will help with that).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
