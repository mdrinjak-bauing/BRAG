name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Syntax check
        run: python -m compileall brag
      - name: Lint
        run: |
          pip install ruff
          ruff check brag --select E9,F63,F7,F82,F401,F811
      - name: Dependency audit (advisory)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t brag-ci .
