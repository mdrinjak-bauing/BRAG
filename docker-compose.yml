services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: asb-qdrant
    restart: unless-stopped
    volumes:
      # Named volume: immune to cloud-sync corruption (iCloud/OneDrive),
      # Spotlight/Time Machine races, and wrong-path mounts.
      - qdrant_data:/qdrant/storage
    # Qdrant is only reachable from the app container, not from the host —
    # uncomment to expose the dashboard at http://localhost:6333/dashboard
    # ports:
    #   - "6333:6333"

  app:
    build: .
    image: asb:latest
    container_name: asb-app
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - path: .env
        required: false
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ${VAULT_PATH:-./vault}:/vault
      - models_cache:/models
      # Project dir + Claude Desktop config: needed by the browser setup
      # wizard (writes .env and the MCP entry). CLAUDE_CONFIG_DIR is set
      # by setup.command / setup.bat.
      - ./:/workspace
      - ${CLAUDE_CONFIG_DIR:-./.claude-config-unset}:/claude-config
    ports:
      # localhost only — the bridge serves your documents and the setup
      # page; it must not be reachable from the local network.
      # If 8765 is taken on your machine, set BRIDGE_HOST_PORT and
      # BRIDGE_PUBLIC_URL in .env.
      - "127.0.0.1:${BRIDGE_HOST_PORT:-8765}:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach LM Studio/Ollama on the host (Linux)

volumes:
  qdrant_data:
  models_cache:
