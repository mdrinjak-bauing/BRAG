services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: brag-qdrant
    restart: unless-stopped
    environment:
      # Qdrant sends anonymized usage telemetry by default. Disable it so that
      # in the local profiles "nothing leaves your machine" is literally true
      # (no document content is ever in this telemetry, but the beacon itself
      # is unexpected for a local-first tool).
      - QDRANT__TELEMETRY_DISABLED=true
    volumes:
      # Named volume: immune to cloud-sync corruption (iCloud/OneDrive),
      # Spotlight/Time Machine races, and wrong-path mounts.
      - qdrant_data:/qdrant/storage
    # Qdrant is only reachable from the app container, not from the host —
    # uncomment to expose the dashboard at http://localhost:6333/dashboard
    # ports:
    #   - "6333:6333"

  app:
    build: .
    image: ${BRAG_IMAGE:-ghcr.io/mdrinjak-bauing/brag:latest}
    container_name: brag-app
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - path: .env
        required: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      # The app is a plain Python process — it needs no Linux capabilities.
      - ALL
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      # The persistent app holds ONLY the knowledge store and the model cache —
      # NOT the project dir or the Claude Desktop config. Those are mounted
      # solely on the one-shot `setup` service below, so the long-running
      # ingest/bridge process cannot read .env or rewrite the host's Claude
      # Desktop config (defence in depth against a parser/RCE in this container).
      - ${VAULT_PATH:-./RAG-Verbindungsordner}:/vault
      - models_cache:/models
    ports:
      # localhost only — the bridge serves your documents (PDF deep-links); it
      # must not be reachable from the local network. If 8765 is taken on your
      # machine, set BRIDGE_HOST_PORT and BRIDGE_PUBLIC_URL in .env.
      - "127.0.0.1:${BRIDGE_HOST_PORT:-8765}:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach LM Studio/Ollama on the host (Linux)

  # One-shot configuration service: serves the browser setup wizard and is the
  # ONLY service that mounts the project dir + the Claude Desktop config (so it
  # can write .env and the MCP entry). It is NOT started by a plain
  # `docker compose up` (guarded by the "setup" profile) — setup.command /
  # setup.bat start it, wait for the .setup_complete marker, then tear it down
  # and bring up the persistent `app`.
  setup:
    image: ${BRAG_IMAGE:-ghcr.io/mdrinjak-bauing/brag:latest}
    profiles: ["setup"]
    container_name: brag-setup
    env_file:
      - path: .env
        required: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - SETUP_MODE=1
      # "1" only when the launcher exported CLAUDE_CONFIG_DIR; lets the wizard
      # tell a real Claude config mount from the throwaway sentinel.
      - CLAUDE_CONFIG_MOUNTED=${CLAUDE_CONFIG_DIR:+1}
    command: ["python", "-m", "brag.setup_server"]
    volumes:
      - ./:/workspace
      - ${CLAUDE_CONFIG_DIR:-./.claude-config-unset}:/claude-config
    ports:
      - "127.0.0.1:${BRIDGE_HOST_PORT:-8765}:8765"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach LM Studio/Ollama on the host (Linux)

volumes:
  qdrant_data:
  models_cache:
