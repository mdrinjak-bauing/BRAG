<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="google" content="notranslate">
<title>BRAG — Building Retrieval-Augmented Generation · Setup</title>
<style>
  :root { --accent:#4a6fa5; --ok:#2e7d32; --warn:#c62828; --muted:#667; }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,Segoe UI,system-ui,sans-serif; margin:0;
         background:#f4f6f9; color:#1c2733; line-height:1.55; }
  .wrap { max-width:680px; margin:0 auto; padding:24px 20px 60px; }
  h1 { font-size:1.5rem; } h2 { font-size:1.15rem; margin-top:0; }
  h3 { font-size:1rem; }
  .card { background:#fff; border-radius:12px; padding:28px;
          box-shadow:0 1px 4px rgba(20,40,70,.08); margin-bottom:16px; }
  .step { display:none; } .step.active { display:block; }
  button { font-size:1rem; padding:10px 22px; border-radius:8px; border:1px solid #cdd6e0;
           background:#fff; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button.big { display:block; width:100%; text-align:left; padding:16px; margin:10px 0; }
  button.big small { display:block; color:var(--muted); font-weight:normal; margin-top:3px; }
  button.primary small { color:#dce6f5; }
  input, select { font-size:1rem; padding:10px; border-radius:8px;
                  border:1px solid #cdd6e0; width:100%; }
  .row { display:flex; gap:10px; margin-top:18px; align-items:center; }
  .row .spacer { flex:1; }
  .hint { color:var(--muted); font-size:.92rem; }
  .ok { color:var(--ok); } .warn { color:var(--warn); }
  .pill { display:inline-block; background:#e8eef6; color:var(--accent);
          border-radius:99px; padding:2px 12px; font-size:.85rem; margin-bottom:8px; }
  .pill.ok { background:#e6f2e7; color:var(--ok); }
  .two { display:flex; gap:14px; flex-wrap:wrap; }
  .two > div { flex:1; min-width:240px; background:#f7f9fc; border-radius:10px; padding:16px; }
  details { margin-top:14px; } summary { cursor:pointer; color:var(--accent); }
  .check { margin:6px 0; }
  a { color:var(--accent); }
  ol li { margin:9px 0; }
  code, .cmd { background:#eef2f7; border-radius:6px; padding:2px 7px; font-size:.92rem; }
  .cmd { display:flex; justify-content:space-between; align-items:center;
         padding:9px 12px; margin:6px 0; font-family:ui-monospace,Menlo,Consolas,monospace; }
  .cmd button { font-size:.8rem; padding:4px 10px; }
  table { border-collapse:collapse; width:100%; font-size:.92rem; }
  td, th { text-align:left; padding:6px 10px; border-bottom:1px solid #eef1f5; }
  .langtoggle { float:right; }
  .langtoggle button { padding:4px 10px; font-size:.85rem; }
  .callout { background:#fdf3e7; border:1px solid #e2c79f; border-radius:9px; padding:12px 14px; margin-top:12px; font-size:.9rem; }
  /* Loud, unmissable warning when Claude Desktop was NOT auto-configured. */
  .alert { background:#fdecea; border:2px solid var(--warn); border-radius:10px;
           padding:16px 18px; margin:0 0 18px; }
  .alert h3 { color:var(--warn); margin:0 0 6px; font-size:1.05rem; }
  .alert .cmd { background:#fff; border:1px solid #e7b7b3; }
  .pill.warn { background:#fdecea; color:var(--warn); }
</style>
</head>
<body>
<div class="wrap">
  <div class="langtoggle">
    <button onclick="setLang('en')" id="lang-en">EN</button>
    <button onclick="setLang('de')" id="lang-de">DE</button>
  </div>
  <h1>📚 BRAG — Building Retrieval-Augmented Generation</h1>

  <!-- STEP 0 -->
  <div class="card step active" id="s0">
    <span class="pill" data-i="badge_intro"></span>
    <h2 data-i="intro_h"></h2>
    <p data-i="intro_p"></p>
    <p class="hint" data-i="intro_hint"></p>
    <div class="row"><span class="spacer"></span>
      <button class="big primary" onclick="show('s1')" data-i="start"></button></div>
    <!-- Shown only when an install already exists: jump straight to a one-page
         settings view instead of re-walking the whole wizard. -->
    <button class="big" id="changebtn" style="display:none" onclick="openSettings()" data-i="change_settings"></button>
  </div>

  <!-- STEP settings: change a single setting without re-walking the wizard -->
  <div class="card step" id="ssettings">
    <span class="pill" data-i="badge_settings"></span>
    <h2 data-i="settings_h"></h2>
    <p class="hint" data-i="settings_p"></p>
    <p class="hint"><span data-i="settings_cur"></span> <b id="cur_ai"></b></p>
    <h3 data-i="doclang_h"></h3>
    <select id="set_language">
      <option value="english">English</option>
      <option value="german">German / Deutsch</option>
      <option value="french">French / Français</option>
      <option value="spanish">Spanish / Español</option>
      <option value="italian">Italian / Italiano</option>
      <option value="dutch">Dutch / Nederlands</option>
      <option value="portuguese">Portuguese / Português</option>
    </select>
    <h3 data-i="rerank_h" style="margin-top:18px;"></h3>
    <label class="check" style="display:block; margin:8px 0;">
      <input type="radio" name="set_rerank" value="off"><span data-i="rerank_off"></span></label>
    <label class="check" style="display:block; margin:8px 0;">
      <input type="radio" name="set_rerank" value="eco"><span data-i="rerank_eco"></span></label>
    <label class="check" style="display:block; margin:8px 0;">
      <input type="radio" name="set_rerank" value="full"><span data-i="rerank_full"></span></label>
    <h3 data-i="vision_h" style="margin-top:18px;"></h3>
    <label class="check" style="display:block; margin:8px 0;">
      <input type="checkbox" id="set_vision"><span data-i="vision_label"></span></label>
    <details>
      <summary data-i="settings_model_adv"></summary>
      <!-- Populated from the saved provider key (server-side) for cloud profiles;
           falls back to the free-text field below for local / no list. -->
      <select id="set_modelsel" onchange="onSetModelChange()" style="display:none; margin-bottom:8px;"></select>
      <p class="hint" data-i="cloud_model_p"></p>
      <input id="set_model" placeholder="" autocomplete="off">
    </details>
    <div class="row">
      <button onclick="show('s0')" data-i="back"></button><span class="spacer"></span>
      <button class="primary" onclick="saveSettings()" data-i="settings_save"></button>
    </div>
  </div>

  <!-- STEP 1: where AI runs -->
  <div class="card step" id="s1">
    <span class="pill" data-i="badge_step1"></span>
    <h2 data-i="privacy_h"></h2>
    <p class="hint" data-i="privacy_p"></p>
    <button class="big primary" onclick="show('s2cloud')">
      <span data-i="privacy_cloud"></span><small data-i="privacy_cloud_s"></small>
    </button>
    <button class="big" onclick="setProfile('hybrid')">
      <span data-i="privacy_local"></span><small data-i="privacy_local_s"></small>
    </button>
  </div>

  <!-- STEP 2cloud: choose cloud provider -->
  <div class="card step" id="s2cloud">
    <span class="pill" data-i="badge_step2"></span>
    <h2 data-i="prov_h"></h2>
    <p class="hint" data-i="prov_p"></p>
    <button class="big primary" onclick="setProvider('gemini')">
      <span data-i="prov_gemini"></span><small data-i="prov_gemini_s"></small>
    </button>
    <div class="callout" data-i="prov_gemini_warn"></div>
    <button class="big" onclick="setProvider('openai')">
      <span data-i="prov_openai"></span><small data-i="prov_openai_s"></small>
    </button>
    <button class="big" onclick="setProvider('anthropic')">
      <span data-i="prov_anthropic"></span><small data-i="prov_anthropic_s"></small>
    </button>
    <div class="callout" data-i="prov_anthropic_note"></div>
    <div class="row"><button onclick="show('s1')" data-i="back"></button></div>
  </div>

  <!-- STEP 2key: API key -->
  <div class="card step" id="s2key">
    <span class="pill" data-i="badge_step2"></span>
    <h2 data-i="key_h"></h2>
    <ol>
      <li><span data-i="key_step1"></span> <a id="keylink" href="#" target="_blank"></a></li>
      <li data-i="key_step2"></li>
      <li data-i="key_step3"></li>
    </ol>
    <input id="apikey" placeholder="sk-... / AIza..." autocomplete="off">
    <p id="keymsg" class="hint"></p>
    <p class="hint" data-i="key_privacy"></p>
    <!-- Filled after the key validates: the provider's chat models as a dropdown
         (cheapest preselected) so there is nothing to type. "Other" reveals a
         free-text field for any id the provider didn't list. -->
    <div id="cloudmodelblock" style="display:none; margin-top:14px;">
      <p data-i="cloud_model_pick"></p>
      <select id="cloudmodelsel" onchange="onCloudModelChange()"></select>
      <div id="cloudmodelother" style="display:none; margin-top:8px;">
        <input id="cloudmodel" placeholder="" autocomplete="off">
        <p class="hint warn" id="cloudmodelwarn" style="display:none"></p>
      </div>
      <p class="hint" data-i="cloud_model_dd"></p>
    </div>
    <div class="row">
      <button onclick="show('s2cloud')" data-i="back"></button><span class="spacer"></span>
      <button class="primary" id="keybtn" onclick="checkKey()" data-i="key_check"></button>
      <button class="primary" id="cloudcontbtn" style="display:none" onclick="cloudContinue()" data-i="continue"></button>
    </div>
  </div>

  <!-- STEP 2h: LM Studio -->
  <div class="card step" id="s2h">
    <span class="pill" data-i="badge_step2"></span>
    <h2 data-i="lms_h"></h2>
    <ol>
      <li data-i="lms_1"></li>
      <li data-i="lms_2">
        <table>
          <tr><th data-i="lms_mem"></th><th data-i="lms_model"></th></tr>
          <tr><td>16 GB</td><td><code>qwen2.5-7b-instruct</code></td></tr>
          <tr><td>32 GB</td><td><code>qwen2.5-14b-instruct</code></td></tr>
          <tr><td>64 GB+</td><td><code>gemma-3-27b-it</code></td></tr>
        </table>
      </li>
      <li data-i="lms_3"></li>
    </ol>
    <div class="row">
      <button class="primary" onclick="checkLocal('hybrid')" data-i="check_conn"></button>
      <span id="localmsg-hybrid" class="hint"></span>
    </div>
    <div id="modelpick-hybrid" style="display:none; margin-top:14px;">
      <p data-i="pick_model"></p><select id="modelsel-hybrid"></select>
      <p class="hint" data-i="model_min"></p>
    </div>
    <div class="row">
      <button onclick="show('s1')" data-i="back"></button><span class="spacer"></span>
      <button class="linkish" onclick="show('s3')" data-i="skip"></button>
      <button class="primary" id="cont-hybrid" disabled onclick="pickModel('hybrid')" data-i="continue"></button>
    </div>
  </div>

  <!-- STEP 3: language of documents -->
  <div class="card step" id="s3">
    <span class="pill" data-i="badge_step3"></span>
    <h2 data-i="doclang_h"></h2>
    <p class="hint" data-i="doclang_p"></p>
    <select id="language">
      <option value="english">English</option>
      <option value="german">German / Deutsch</option>
      <option value="french">French / Français</option>
      <option value="spanish">Spanish / Español</option>
      <option value="italian">Italian / Italiano</option>
      <option value="dutch">Dutch / Nederlands</option>
      <option value="portuguese">Portuguese / Português</option>
    </select>
    <!-- Optional: tick top-level folders to keep OUT of the index. Only shown
         when the project folder is mounted and has such folders; otherwise the
         "_"-prefix convention (see hint) is the way. -->
    <div id="excludeblock" style="display:none; margin-top:18px;">
      <h3 data-i="exclude_h"></h3>
      <p class="hint" data-i="exclude_p"></p>
      <div id="excludelist"></div>
    </div>
    <div class="row">
      <button onclick="back3()" data-i="back"></button><span class="spacer"></span>
      <button class="primary" onclick="show('sperf')" data-i="continue"></button>
    </div>
  </div>

  <!-- STEP sperf: reranker + vision (performance & privacy) -->
  <div class="card step" id="sperf">
    <span class="pill" data-i="badge_perf"></span>
    <h2 data-i="perf_h"></h2>
    <p class="hint" data-i="perf_intro"></p>
    <h3 data-i="rerank_h"></h3>
    <label class="check" style="display:block; margin:8px 0;">
      <input type="radio" name="rerank" value="off">
      <span data-i="rerank_off"></span>
    </label>
    <label class="check" style="display:block; margin:8px 0;">
      <input type="radio" name="rerank" value="eco" checked>
      <span data-i="rerank_eco"></span>
    </label>
    <label class="check" style="display:block; margin:8px 0;">
      <input type="radio" name="rerank" value="full">
      <span data-i="rerank_full"></span>
    </label>
    <p class="hint" data-i="rerank_hw"></p>
    <h3 data-i="vision_h" style="margin-top:18px;"></h3>
    <label class="check" style="display:block; margin:8px 0;">
      <input type="checkbox" id="vision" checked>
      <span data-i="vision_label"></span>
    </label>
    <p class="hint" data-i="vision_hint"></p>
    <div class="row">
      <button onclick="show('s3')" data-i="back"></button><span class="spacer"></span>
      <button class="primary" onclick="apply()" data-i="finish"></button>
    </div>
  </div>

  <!-- STEP 4 -->
  <div class="card step" id="s4">
    <h2 data-i="applying"></h2>
    <div id="applylog"></div>
  </div>

  <!-- STEP 5 -->
  <div class="card step" id="s5">
    <!-- Shown ONLY when Claude Desktop was not auto-configured. Rendered first,
         loud, and outside the green "complete" framing so it cannot be missed. -->
    <div class="alert" id="claudealert" style="display:none">
      <h3 data-i="claude_warn_h"></h3>
      <p data-i="claude_warn_p"></p>
      <p class="hint" id="claude_warn_path"></p>
      <pre class="cmd"><code id="claude_warn_code"></code><button id="claude_warn_copy" type="button">copy</button></pre>
      <p class="hint" data-i="claude_warn_after"></p>
      <details><summary data-i="claude_warn_why_s"></summary>
        <p class="hint" data-i="claude_warn_why_p"></p></details>
    </div>
    <span class="pill ok" id="done_badge" data-i="done_badge"></span>
    <h2 data-i="done_h"></h2>
    <div class="two">
      <div><h3 data-i="lib_h"></h3><p data-i="lib_p"></p></div>
      <div><h3 data-i="note_h"></h3><p><code>WissensWIKI/Wissen/</code></p><p data-i="note_p"></p></div>
    </div>
    <p class="hint" data-i="restart_note"></p>

    <h3 data-i="walk_h"></h3>
    <p class="hint" data-i="walk_intro"></p>
    <ol>
      <li><b data-i="walk1_h"></b>
        <p data-i="walk1_p"></p>
        <div class="cmd"><span data-i="walk1_q1"></span><button onclick="copyCmd(this)">copy</button></div>
        <div class="cmd"><span data-i="walk1_q2"></span><button onclick="copyCmd(this)">copy</button></div>
      </li>
      <li><b data-i="walk2_h"></b>
        <p data-i="walk2_p"></p>
        <div class="cmd"><span data-i="walk2_q"></span><button onclick="copyCmd(this)">copy</button></div>
        <p class="hint" data-i="walk2_obs"></p>
      </li>
      <li><b data-i="walk3_h"></b>
        <p data-i="walk3_p"></p>
        <div class="cmd"><span data-i="walk3_q"></span><button onclick="copyCmd(this)">copy</button></div>
      </li>
    </ol>
    <p class="hint" data-i="walk_done"></p>

    <h3 data-i="more_h"></h3>
    <ul>
      <li data-i="more_1"></li><li data-i="more_2"></li><li data-i="more_3"></li><li data-i="more_4"></li>
    </ul>

    <div class="callout">
      <p data-i="tip_sysprompt"></p>
      <p data-i="tip_status"></p>
      <p data-i="tip_claudecode"></p>
    </div>

    <p class="hint" data-i="done_close"></p>
  </div>
</div>

<script>
const STR = {

    lms_h:"Install LM Studio and load a model",
    lms_1:"Install LM Studio (free): lmstudio.ai → Download → open it once.",
    lms_2:"Download a model matching your memory:", lms_mem:"Your memory (RAM)", lms_model:"Recommended model",

const KEYLINKS = {
  gemini:"https://aistudio.google.com/apikey",
  openai:"https://platform.openai.com/api-keys",

};
const state = { profile:"gemini", provider:"gemini", apikey:"", localModel:"", cloudModel:"", rerank:"eco", vision:true };
let lang = (navigator.language||"en").toLowerCase().startsWith("de") ? "de" : "en";

function t(k){ return (STR[lang] && STR[lang][k]) || STR.en[k] || ""; }
function applyLang(){
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i]").forEach(el => { el.textContent = t(el.getAttribute("data-i")); });
  document.getElementById("lang-en").style.fontWeight = lang==="en" ? "700" : "400";
  document.getElementById("lang-de").style.fontWeight = lang==="de" ? "700" : "400";
}
function setLang(l){ lang = l; applyLang(); }
function show(id){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active"); window.scrollTo(0,0);
}
function setProfile(p){ state.profile = p; show("s2h"); }
function setProvider(p){
  state.provider = p; state.profile = p;
  const link = document.getElementById("keylink");
  link.href = KEYLINKS[p]; link.textContent = KEYLINKS[p];
  show("s2key");
}
function back3(){
  if (state.profile==="hybrid") show("s2h");
  else show("s2key");
}
function copyCmd(btn){
  navigator.clipboard.writeText(btn.parentElement.firstElementChild.textContent);
  btn.textContent="copied ✓"; setTimeout(()=>btn.textContent="copy", 1500);
}
async function checkKey(){
  const key = document.getElementById("apikey").value.trim();
  const msg = document.getElementById("keymsg"); const btn = document.getElementById("keybtn");
  if(!key){ msg.textContent="Please paste your key first."; msg.className="warn"; return; }
  btn.disabled = true; msg.textContent="…"; msg.className="hint";
  try{
    const r = await fetch("/api/validate-key",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({provider:state.provider, key})});
    const d = await r.json();
    if(d.ok){ state.apikey = key; msg.textContent="✓ "+d.message; msg.className="ok"; setupCloudModels(d.models||[]); }
    else { msg.textContent=d.message; msg.className="warn"; }
  }catch(e){ msg.textContent="Could not reach the setup service — is it still running?"; msg.className="warn"; }
  btn.disabled = false;
}
// After the key validates, offer the provider's chat models as a dropdown
// (cheapest first). "Other" reveals a free-text field for any unlisted id; an
// empty / no-list state falls back to that field so setup never gets stuck.
let CLOUD_MODELS=[], cloudOtherConfirmed=false;
function setupCloudModels(models){
  CLOUD_MODELS = models || []; cloudOtherConfirmed=false;
  const sel=document.getElementById("cloudmodelsel");
  const other=new Option(t("cloud_model_other"), "__other__");
  if(CLOUD_MODELS.length){
    sel.replaceChildren(...CLOUD_MODELS.map(m=>new Option(m,m)), other);
    sel.value=CLOUD_MODELS[0];
    document.getElementById("cloudmodelother").style.display="none";
  } else {
    sel.replaceChildren(other); sel.value="__other__";
    document.getElementById("cloudmodelother").style.display="block";
  }
  document.getElementById("cloudmodelwarn").style.display="none";
  document.getElementById("cloudmodelblock").style.display="block";
  document.getElementById("keybtn").style.display="none";
  document.getElementById("cloudcontbtn").style.display="inline-block";
}
function onCloudModelChange(){
  const other=document.getElementById("cloudmodelsel").value==="__other__";
  document.getElementById("cloudmodelother").style.display=other?"block":"none";
  document.getElementById("cloudmodelwarn").style.display="none"; cloudOtherConfirmed=false;
}
function cloudContinue(){
  const sel=document.getElementById("cloudmodelsel");
  let model = sel.value;
  if(model==="__other__"){
    model = document.getElementById("cloudmodel").value.trim();
    // Soft check against the fetched list: warn once, then allow on a 2nd click.
    if(model && CLOUD_MODELS.length && !CLOUD_MODELS.includes(model) && !cloudOtherConfirmed){
      const warn=document.getElementById("cloudmodelwarn");
      warn.textContent=t("cloud_model_unknown"); warn.style.display="block";
      cloudOtherConfirmed=true; return;
    }
  }
  state.cloudModel = model; show("s3");
}
// Optional exclude-folder picker: list the project's top-level folders so the
// user can tick the ones to keep out of the index. Best-effort — silently does
// nothing if the project isn't mounted (the "_"-prefix convention still works).
async function loadFolders(){
  try{
    const r = await fetch("/api/list-folders",{method:"POST",
      headers:{"Content-Type":"application/json"}, body:"{}"});
    const d = await r.json();
    if(!(d.folders && d.folders.length)) return;
    const list=document.getElementById("excludelist");
    list.replaceChildren(...d.folders.map(f=>{
      const lab=document.createElement("label"); lab.className="check";
      lab.style.display="block"; lab.style.margin="6px 0";
      const cb=document.createElement("input"); cb.type="checkbox";
      cb.value=f.name; cb.checked=!!f.excluded; cb.className="excl";
      lab.appendChild(cb); lab.append(" "+f.name); return lab;
    }));
    document.getElementById("excludeblock").style.display="block";
  }catch(e){ /* not in setup / project not mounted: rely on the _ convention */ }
}
async function checkLocal(profile){
  const msg = document.getElementById("localmsg-"+profile); msg.textContent="…"; msg.className="hint";
  try{
    const r = await fetch("/api/check-local",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({profile})});
    const d = await r.json();
    msg.textContent=(d.ok?"✓ ":"")+d.message; msg.className=d.ok?"ok":"warn";
    if(d.models && d.models.length){
      const sel=document.getElementById("modelsel-"+profile);
      sel.replaceChildren(...d.models.map(m=>new Option(m,m)));
      document.getElementById("modelpick-"+profile).style.display="block";
    }
    document.getElementById("cont-"+profile).disabled = !d.ok;
  }catch(e){ msg.textContent="Could not reach the setup service."; msg.className="warn"; }
}
function pickModel(profile){
  const sel=document.getElementById("modelsel-"+profile);
  state.localModel = sel && sel.value ? sel.value : ""; show("s3");
}
async function _submitSetup(body){
  show("s4");
  const log=document.getElementById("applylog"); log.replaceChildren();
  const add=(txt,cls)=>{const p=document.createElement("p");p.className="check "+(cls||"");p.textContent=txt;log.appendChild(p);};
  try{
    const r = await fetch("/api/setup",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(body)});
    const d = await r.json();
    (d.steps||[]).forEach(s=>add((s.ok?"✓ ":"⚠ ")+s.message, s.ok?"ok":"warn"));
    // Claude Desktop not auto-configured → surface a LOUD, unmissable warning at
    // the TOP of the final screen, and downgrade the green "complete" badge so
    // the user is never told the install is fully done when it is not.
    if(d.claude_manual_snippet){
      const alert=document.getElementById("claudealert");
      alert.style.display="block";
      if(d.claude_config_path){
        document.getElementById("claude_warn_path").textContent = d.claude_config_path;
      }
      const snippet = d.claude_snippet || "";
      document.getElementById("claude_warn_code").textContent = snippet;
      const cp=document.getElementById("claude_warn_copy");
      cp.onclick=()=>{ navigator.clipboard.writeText(snippet); cp.textContent="copied ✓"; setTimeout(()=>cp.textContent="copy",1500); };
      const badge=document.getElementById("done_badge");
      badge.removeAttribute("data-i");
      badge.className="pill warn";
      badge.textContent = (lang==="de" ? "⚠ Fast fertig — ein Schritt fehlt" : "⚠ Almost done — one step left");
    }
    setTimeout(()=>show("s5"),900);
  }catch(e){ add("Something went wrong: "+e,"warn"); }
}
async function apply(){
  const cloud = ["gemini","openai","anthropic"].includes(state.profile);
  // Reranker + vision: read the sperf controls if they were touched, otherwise
  // fall back to the express-path defaults on state (eco / true).
  const rerankEl = document.querySelector('input[name="rerank"]:checked');
  const rerank_profile = (rerankEl && rerankEl.value) || state.rerank || "eco";
  const visionEl = document.getElementById("vision");
  const vision_enabled = visionEl ? visionEl.checked : (state.vision !== false);
  const excl = Array.from(document.querySelectorAll("input.excl:checked"))
    .map(c=>c.value).join(",");
  await _submitSetup({
    profile: state.profile,
    api_key: cloud ? state.apikey : "",
    language: document.getElementById("language").value,
    vault_path: "",
    llm_model: cloud ? (state.cloudModel||"") : state.localModel,
    rerank_profile, vision_enabled,
    exclude_dirs: excl,
  });
}
// ── "Change a setting" quick path (existing install only) ──────────────────
let CURRENT = null;
async function loadCurrent(){
  try{
    const r = await fetch("/api/current-settings",{method:"POST",
      headers:{"Content-Type":"application/json"}, body:"{}"});
    CURRENT = await r.json();
    if(CURRENT && CURRENT.configured){
      document.getElementById("changebtn").style.display="block";
    }
  }catch(e){ /* fresh install / setup not active: just hide the button */ }
}
function openSettings(){
  if(!CURRENT || !CURRENT.configured) return;
  document.getElementById("cur_ai").textContent =
    CURRENT.profile + (CURRENT.llm_model ? " · "+CURRENT.llm_model : "")
    + (CURRENT.has_key ? (lang==="de" ? " · API-Key bleibt" : " · API key kept") : "");
  if(CURRENT.language){ document.getElementById("set_language").value = CURRENT.language; }
  document.querySelectorAll('input[name="set_rerank"]').forEach(el=>{
    el.checked = (el.value === (CURRENT.rerank_profile || "eco")); });
  document.getElementById("set_vision").checked = CURRENT.vision_enabled !== false;
  document.getElementById("set_model").value = CURRENT.llm_model || "";
  // Default: free-text only. For a cloud profile, try to turn it into a dropdown
  // using the SAVED key (server-side) so the model can be picked, not typed.
  const sel = document.getElementById("set_modelsel");
  sel.style.display = "none";
  document.getElementById("set_model").style.display = "block";
  show("ssettings");
  loadCurrentModels();
}
async function loadCurrentModels(){
  const sel = document.getElementById("set_modelsel");
  const txt = document.getElementById("set_model");
  try{
    const r = await fetch("/api/list-models-current",{method:"POST",
      headers:{"Content-Type":"application/json"}, body:"{}"});
    const d = await r.json();
    if(!(d.ok && d.models && d.models.length)) return;   // keep free-text
    const cur = (CURRENT && CURRENT.llm_model) || "";
    const opts = d.models.map(m=>new Option(m,m));
    opts.push(new Option(t("cloud_model_other"), "__other__"));
    sel.replaceChildren(...opts);
    // Preselect the saved model if it is in the list, else "Other" (keep its text).
    if(cur && d.models.includes(cur)){ sel.value = cur; txt.style.display="none"; }
    else if(cur){ sel.value = "__other__"; txt.style.display="block"; }
    else { sel.value = d.models[0]; txt.style.display="none"; }
    sel.style.display = "block";
  }catch(e){ /* offline / no key: free-text field stays */ }
}
function onSetModelChange(){
  const other = document.getElementById("set_modelsel").value === "__other__";
  document.getElementById("set_model").style.display = other ? "block" : "none";
}
function _chosenSetModel(){
  const sel = document.getElementById("set_modelsel");
  if(sel.style.display !== "none" && sel.value && sel.value !== "__other__") return sel.value;
  return document.getElementById("set_model").value.trim();
}
async function saveSettings(){
  const rr = document.querySelector('input[name="set_rerank"]:checked');
  await _submitSetup({
    profile: (CURRENT && CURRENT.profile) || "gemini",
    api_key: "",                 // empty -> server keeps the existing key (same provider)
    language: document.getElementById("set_language").value,
    vault_path: "",
    llm_model: _chosenSetModel(),
    rerank_profile: (rr && rr.value) || "eco",
    vision_enabled: document.getElementById("set_vision").checked,
  });
}
applyLang();
loadCurrent();
loadFolders();
</script>
