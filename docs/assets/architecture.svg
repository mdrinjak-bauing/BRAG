<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" font-family="-apple-system,'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrInk2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#243447"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a5ba6"/>
    </marker>
  </defs>

  <rect width="980" height="620" fill="#faf8f3"/>
  <text x="36" y="42" font-family="Georgia,serif" font-size="21" fill="#243447">BRAG — Building Retrieval-Augmented Generation — the big picture</text>
  <rect x="36" y="54" width="64" height="3" fill="#c0653f"/>

  <!-- machine frame -->
  <rect x="20" y="70" width="940" height="524" rx="14" fill="none" stroke="#cfc8b8" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="44" y="92" font-size="11" fill="#8a8377" font-weight="600" letter-spacing="1.5">YOUR COMPUTER</text>

  <!-- ── column: vault ── -->
  <rect x="40" y="104" width="250" height="296" rx="12" fill="#ffffff" stroke="#e6e0d4"/>
  <text x="58" y="132" font-size="14" font-weight="700" fill="#243447">🗂 Your knowledge store</text>
  <text x="58" y="149" font-size="11" fill="#8a8377">a normal folder — fully yours</text>

  <rect x="54" y="162" width="222" height="104" rx="9" fill="#eef3ea" stroke="#b5c9af"/>
  <text x="66" y="184" font-size="12.5" font-weight="700" fill="#243447">📚 Library · sources/</text>
  <text x="66" y="203" font-size="11" fill="#4a5568">your PDFs &amp; documents —</text>
  <text x="66" y="219" font-size="11" fill="#4a5568">indexed, searchable, cited</text>
  <text x="66" y="235" font-size="11" fill="#4a5568">with page numbers</text>

  <rect x="54" y="278" width="222" height="110" rx="9" fill="#efe9f6" stroke="#c9b8e0"/>
  <text x="66" y="300" font-size="12.5" font-weight="700" fill="#243447">📓 Notebook · wiki/, notes/</text>
  <text x="66" y="319" font-size="11" fill="#4a5568">your own thinking —</text>
  <text x="66" y="335" font-size="11" fill="#4a5568">never in the search index,</text>
  <text x="66" y="351" font-size="11" fill="#4a5568">so you'll never cite yourself</text>
  <text x="66" y="367" font-size="11" fill="#4a5568">by accident</text>

  <!-- ── column: docker ── -->
  <rect x="355" y="104" width="270" height="296" rx="12" fill="#ffffff" stroke="#e6e0d4"/>
  <text x="373" y="132" font-size="14" font-weight="700" fill="#243447">🐳 Docker — engine room</text>
  <text x="373" y="149" font-size="11" fill="#8a8377">installed once · runs by itself</text>

  <rect x="369" y="162" width="242" height="140" rx="9" fill="#eaf0f7" stroke="#b9cde4"/>
  <text x="381" y="184" font-size="12.5" font-weight="700" fill="#243447">app container</text>
  <text x="381" y="203" font-size="11" fill="#4a5568">watches sources/, parses &amp;</text>
  <text x="381" y="219" font-size="11" fill="#4a5568">chunks documents, enriches</text>
  <text x="381" y="235" font-size="11" fill="#4a5568">them with AI context, builds</text>
  <text x="381" y="251" font-size="11" fill="#4a5568">the index, answers searches</text>
  <text x="381" y="277" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#2c4a6e">→ details: pipeline diagram</text>

  <rect x="369" y="314" width="242" height="74" rx="9" fill="#eaf0f7" stroke="#b9cde4"/>
  <text x="381" y="336" font-size="12.5" font-weight="700" fill="#243447">Qdrant — vector database</text>
  <text x="381" y="355" font-size="11" fill="#4a5568">the search index, rebuildable</text>
  <text x="381" y="371" font-size="11" fill="#4a5568">from your knowledge store anytime</text>

  <!-- ── column: claude ── -->
  <rect x="690" y="104" width="250" height="296" rx="12" fill="#ffffff" stroke="#e6e0d4"/>
  <text x="708" y="132" font-size="14" font-weight="700" fill="#243447">💬 Claude Desktop</text>
  <text x="708" y="149" font-size="11" fill="#8a8377">your interface — you just ask</text>

  <rect x="704" y="162" width="222" height="104" rx="9" fill="#fdf3e7" stroke="#e2c79f"/>
  <text x="716" y="184" font-size="12.5" font-weight="700" fill="#243447">MCP 1 · library search</text>
  <text x="716" y="203" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#8a5a23">search · list_sources ·</text>
  <text x="716" y="219" font-size="10.5" font-family="ui-monospace,Menlo,monospace" fill="#8a5a23">inspect_chunks · save/list_passages</text>
  <text x="716" y="243" font-size="11" font-style="italic" fill="#8a5a23">configured automatically ✓</text>

  <rect x="704" y="278" width="222" height="110" rx="9" fill="#efe9f6" stroke="#c9b8e0"/>
  <text x="716" y="300" font-size="12.5" font-weight="700" fill="#243447">MCP 2 · notebook access</text>
  <text x="716" y="319" font-size="11" fill="#4a5568">Claude reads &amp; writes your</text>
  <text x="716" y="335" font-size="11" fill="#4a5568">notes via Obsidian MCP Tools</text>
  <text x="716" y="357" font-size="11" font-style="italic" fill="#59437d">optional · 5 minutes ·</text>
  <text x="716" y="373" font-size="11" font-style="italic" fill="#59437d">docs/OBSIDIAN.md</text>

  <!-- arrow: vault → docker (in the clear gap between the two cards) -->
  <rect x="294" y="196" width="56" height="14" rx="3" fill="#faf8f3"/>
  <text x="322" y="207" font-size="10" fill="#243447" text-anchor="middle">auto-index</text>
  <line x1="292" y1="222" x2="353" y2="222" stroke="#243447" stroke-width="1.8" marker-end="url(#arrInk2)"/>

  <!-- arrow: docker ↔ claude (in the clear gap) -->
  <line x1="629" y1="214" x2="688" y2="214" stroke="#243447" stroke-width="1.8" marker-end="url(#arrInk2)" marker-start="url(#arrInk2)"/>
  <rect x="618" y="222" width="82" height="14" rx="3" fill="#faf8f3"/>
  <text x="659" y="233" font-size="9.5" fill="#243447" text-anchor="middle">ask ↔ cited answer</text>

  <!-- notebook connection: routed BELOW the columns, never crossing a box -->
  <path d="M 815 388 L 815 448 L 166 448 L 166 392" stroke="#7a5ba6" stroke-width="1.8" fill="none" stroke-dasharray="5 4" marker-end="url(#arrPurple)"/>
  <rect x="285" y="440" width="410" height="15" rx="3" fill="#faf8f3"/>
  <text x="490" y="452" font-size="10.5" fill="#59437d" text-anchor="middle">notebook read &amp; write — goes around the search index, not through it</text>

  <!-- setup strip -->
  <rect x="40" y="472" width="900" height="104" rx="12" fill="#ffffff" stroke="#e6e0d4"/>
  <text x="58" y="498" font-size="13" font-weight="700" fill="#243447">⚙️ One-time setup</text>

  <rect x="58" y="512" width="190" height="44" rx="8" fill="#f4f1ea" stroke="#d8d2c4"/>
  <text x="153" y="530" font-size="10.5" fill="#4a5568" text-anchor="middle">double-click setup.command</text>
  <text x="153" y="545" font-size="10.5" fill="#4a5568" text-anchor="middle">(Mac) or setup.bat (Windows)</text>
  <line x1="252" y1="534" x2="272" y2="534" stroke="#243447" stroke-width="1.8" marker-end="url(#arrInk2)"/>

  <rect x="276" y="512" width="200" height="44" rx="8" fill="#f4f1ea" stroke="#d8d2c4"/>
  <text x="376" y="530" font-size="10.5" fill="#4a5568" text-anchor="middle">browser assistant —</text>
  <text x="376" y="545" font-size="10.5" fill="#4a5568" text-anchor="middle">three plain questions</text>
  <line x1="480" y1="534" x2="500" y2="534" stroke="#243447" stroke-width="1.8" marker-end="url(#arrInk2)"/>

  <rect x="504" y="512" width="190" height="44" rx="8" fill="#f4f1ea" stroke="#d8d2c4"/>
  <text x="599" y="530" font-size="10.5" fill="#4a5568" text-anchor="middle">restart Claude Desktop</text>
  <text x="599" y="545" font-size="10.5" fill="#4a5568" text-anchor="middle">(quit completely)</text>
  <line x1="698" y1="534" x2="718" y2="534" stroke="#243447" stroke-width="1.8" marker-end="url(#arrInk2)"/>

  <rect x="722" y="512" width="200" height="44" rx="8" fill="#eef3ea" stroke="#b5c9af"/>
  <text x="822" y="530" font-size="10.5" font-weight="700" fill="#2e5d2e" text-anchor="middle">drop a PDF into sources/</text>
  <text x="822" y="545" font-size="10.5" fill="#2e5d2e" text-anchor="middle">— ask away ✓</text>
</svg>
