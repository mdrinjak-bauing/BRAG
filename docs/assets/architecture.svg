<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="-apple-system,'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b7b99"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="980" height="560" fill="#f7f9fc"/>
  <text x="30" y="42" font-size="22" font-weight="700" fill="#1c2733">Academic Second Brain — how the pieces fit</text>

  <!-- ════ YOUR COMPUTER frame ════ -->
  <rect x="20" y="64" width="940" height="476" rx="14" fill="none" stroke="#c3cfdd" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="38" y="90" font-size="13" fill="#7e8da0" font-weight="600">YOUR COMPUTER</text>

  <!-- ── Vault (left) ── -->
  <rect x="40" y="110" width="240" height="300" rx="12" fill="#ffffff" stroke="#d7dee8"/>
  <text x="60" y="140" font-size="15" font-weight="700" fill="#1c2733">🗂 Your vault</text>
  <text x="60" y="158" font-size="11.5" fill="#7e8da0">one normal folder — open it with Obsidian</text>

  <rect x="56" y="172" width="208" height="94" rx="9" fill="#eef4ec" stroke="#bcd4b8"/>
  <text x="70" y="194" font-size="13" font-weight="700" fill="#2e5d2e">📚 Library — sources/</text>
  <text x="70" y="212" font-size="11.5" fill="#3c4a3c">your PDFs &amp; documents</text>
  <text x="70" y="228" font-size="11.5" fill="#3c4a3c">indexed &amp; searchable</text>
  <text x="70" y="244" font-size="11.5" fill="#3c4a3c">cited with page numbers</text>

  <rect x="56" y="278" width="208" height="110" rx="9" fill="#f3effa" stroke="#cfc3e4"/>
  <text x="70" y="300" font-size="13" font-weight="700" fill="#4d3a73">📓 Notebook — wiki/, notes/</text>
  <text x="70" y="318" font-size="11.5" fill="#473d59">your own thinking</text>
  <text x="70" y="334" font-size="11.5" fill="#473d59">never in the search index</text>
  <text x="70" y="350" font-size="11.5" fill="#473d59">(no echo effect — you won't</text>
  <text x="70" y="366" font-size="11.5" fill="#473d59">cite yourself by accident)</text>

  <!-- ── Docker (middle) ── -->
  <rect x="360" y="110" width="280" height="300" rx="12" fill="#ffffff" stroke="#d7dee8"/>
  <text x="380" y="140" font-size="15" font-weight="700" fill="#1c2733">🐳 Docker</text>
  <text x="380" y="158" font-size="11.5" fill="#7e8da0">installed once — runs everything</text>

  <rect x="376" y="172" width="248" height="130" rx="9" fill="#e9f0f8" stroke="#b9cde4"/>
  <text x="390" y="194" font-size="13" font-weight="700" fill="#2c4a6e">app container</text>
  <text x="390" y="214" font-size="11.5" fill="#33465c">• watcher: auto-indexes new files</text>
  <text x="390" y="231" font-size="11.5" fill="#33465c">• parser: tables, figures, chapters</text>
  <text x="390" y="248" font-size="11.5" fill="#33465c">• AI context for every chunk</text>
  <text x="390" y="265" font-size="11.5" fill="#33465c">• hybrid search + reranking</text>
  <text x="390" y="282" font-size="11.5" fill="#33465c">• setup assistant + PDF links</text>

  <rect x="376" y="314" width="248" height="74" rx="9" fill="#e9f0f8" stroke="#b9cde4"/>
  <text x="390" y="336" font-size="13" font-weight="700" fill="#2c4a6e">Qdrant (vector database)</text>
  <text x="390" y="354" font-size="11.5" fill="#33465c">the search index — rebuildable</text>
  <text x="390" y="371" font-size="11.5" fill="#33465c">anytime from your vault</text>

  <!-- ── Claude Desktop (right) ── -->
  <rect x="720" y="110" width="220" height="300" rx="12" fill="#ffffff" stroke="#d7dee8"/>
  <text x="740" y="140" font-size="15" font-weight="700" fill="#1c2733">💬 Claude Desktop</text>
  <text x="740" y="158" font-size="11.5" fill="#7e8da0">your interface — just ask</text>

  <rect x="736" y="172" width="188" height="100" rx="9" fill="#fdf3ec" stroke="#e8cdb4"/>
  <text x="750" y="194" font-size="12.5" font-weight="700" fill="#7a4a1e">MCP 1 · search</text>
  <text x="750" y="212" font-size="11" fill="#5c4632">search · list_sources ·</text>
  <text x="750" y="228" font-size="11" fill="#5c4632">inspect_chunks ·</text>
  <text x="750" y="244" font-size="11" fill="#5c4632">save_passage · list_passages</text>
  <text x="750" y="262" font-size="10.5" fill="#9b6f3f">set up automatically ✓</text>

  <rect x="736" y="284" width="188" height="104" rx="9" fill="#f3effa" stroke="#cfc3e4"/>
  <text x="750" y="306" font-size="12.5" font-weight="700" fill="#4d3a73">MCP 2 · notebook</text>
  <text x="750" y="324" font-size="11" fill="#473d59">read &amp; write your notes</text>
  <text x="750" y="340" font-size="11" fill="#473d59">via Obsidian MCP Tools</text>
  <text x="750" y="358" font-size="10.5" fill="#7c6a9e">optional, 5 min</text>
  <text x="750" y="374" font-size="10.5" fill="#7c6a9e">(docs/OBSIDIAN.md)</text>

  <!-- arrows between columns -->
  <line x1="282" y1="219" x2="358" y2="219" stroke="#5b7b99" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="320" y="208" font-size="10.5" fill="#5b7b99" text-anchor="middle">auto-index</text>

  <line x1="642" y1="222" x2="718" y2="222" stroke="#5b7b99" stroke-width="2" marker-end="url(#arrB)" marker-start="url(#arrB)"/>
  <text x="680" y="211" font-size="10.5" fill="#5b7b99" text-anchor="middle">questions ↔</text>
  <text x="680" y="238" font-size="10.5" fill="#5b7b99" text-anchor="middle">cited answers</text>

  <path d="M 736 336 C 660 336 330 336 268 336" stroke="#9b8cba" stroke-width="2" fill="none" marker-end="url(#arrB)" stroke-dasharray="5 4"/>
  <text x="500" y="328" font-size="10.5" fill="#7c6a9e" text-anchor="middle">read &amp; write notes (bypasses the index)</text>

  <!-- ════ bottom: setup flow ════ -->
  <rect x="40" y="432" width="900" height="88" rx="12" fill="#ffffff" stroke="#d7dee8"/>
  <text x="60" y="460" font-size="13.5" font-weight="700" fill="#1c2733">⚙️ One-time setup</text>

  <rect x="60" y="472" width="180" height="34" rx="8" fill="#eef2f7"/>
  <text x="150" y="493" font-size="11.5" fill="#33465c" text-anchor="middle">1 · double-click setup script</text>
  <line x1="244" y1="489" x2="268" y2="489" stroke="#5b7b99" stroke-width="2" marker-end="url(#arrB)"/>

  <rect x="272" y="472" width="200" height="34" rx="8" fill="#eef2f7"/>
  <text x="372" y="493" font-size="11.5" fill="#33465c" text-anchor="middle">2 · browser assistant: 3 questions</text>
  <line x1="476" y1="489" x2="500" y2="489" stroke="#5b7b99" stroke-width="2" marker-end="url(#arrB)"/>

  <rect x="504" y="472" width="200" height="34" rx="8" fill="#eef2f7"/>
  <text x="604" y="493" font-size="11.5" fill="#33465c" text-anchor="middle">3 · restart Claude Desktop</text>
  <line x1="708" y1="489" x2="732" y2="489" stroke="#5b7b99" stroke-width="2" marker-end="url(#arrB)"/>

  <rect x="736" y="472" width="184" height="34" rx="8" fill="#e6f2e7"/>
  <text x="828" y="493" font-size="11.5" fill="#2e5d2e" text-anchor="middle">4 · drop a PDF — ask away ✓</text>
</svg>
