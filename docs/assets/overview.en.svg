<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="-apple-system,&#39;Segoe UI&#39;,system-ui,sans-serif" role="img" aria-labelledby="ttl dsc">
  <title id="ttl">The BRAG cycle</title>
  <desc id="dsc">A clockwise cycle around your local machine: collect documents, process them locally, ask with citations, think with AI, and write notes back into your knowledge store with two-way traffic. Optional services dock in via a cloud.</desc>
  
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#b7ad9b"></path></marker>
    <marker id="arT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c0653f"></path></marker>
    <marker id="arB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#5a7ba6"></path></marker>
    <radialGradient id="hub" cx="50%" cy="42%" r="62%"><stop offset="0%" stop-color="#fff"></stop><stop offset="100%" stop-color="#fbf7ee"></stop></radialGradient>
  </defs>

  <rect x="6" y="6" width="1188" height="628" rx="22" fill="#fffdf9" stroke="#e6e0d4" stroke-width="1.5"></rect>

  <text x="44" y="48" font-size="13" font-weight="700" letter-spacing="2.4" fill="#c0653f">ONE CYCLE — YOUR KNOWLEDGE GROWS</text>
  <text x="44" y="80" font-family="Georgia,&#39;Times New Roman&#39;,serif" font-size="27" font-weight="600" fill="#243447">Your knowledge gathers in files you own — not in the chat.</text>

  
  <circle cx="600" cy="358" r="222" fill="none" stroke="#ece6da" stroke-width="2" stroke-dasharray="2 7"></circle>
  <g fill="none" stroke="#d8cfbd" stroke-width="2.4" stroke-linecap="round">
    <path class="ringline" d="M682 154 A 222 222 0 0 1 773 213" marker-end="url(#ar)"></path>
    <path class="ringline" d="M824 369 A 222 222 0 0 1 791 477" marker-end="url(#ar)"></path>
    <path class="ringline" d="M655 573 A 222 222 0 0 1 545 573" marker-end="url(#ar)"></path>
    <path class="ringline" d="M409 477 A 222 222 0 0 1 376 369" marker-end="url(#ar)"></path>
    <path class="ringline" d="M427 213 A 222 222 0 0 1 518 154" marker-end="url(#ar)"></path>
  </g>

  
  <path d="M780 300 C 752 306, 732 308, 718 314" fill="none" stroke="#9fb6d6" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arB)"></path>
  <path d="M718 440 C 740 452, 754 460, 762 472" fill="none" stroke="#9fb6d6" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arB)"></path>

  
  
  <path d="M450 452 H750 L770 478 H430 Z" fill="#ded7c8" stroke="#cfc8b8" stroke-width="1.5" stroke-linejoin="round"></path>
  <path d="M560 452 a40 40 0 0 0 80 0" fill="#cfc8b8"></path>
  
  <rect x="452" y="296" width="296" height="160" rx="14" fill="#e8e2d5" stroke="#cfc8b8" stroke-width="2"></rect>
  
  <rect x="462" y="306" width="276" height="140" rx="8" fill="#fffdf9" stroke="#e3dccb" stroke-width="1"></rect>
  <text x="600" y="328" font-size="11" font-weight="700" letter-spacing="1.6" fill="#8a8377" text-anchor="middle">KNOWLEDGE STORE · LOCAL</text>
  <line x1="600" y1="336" x2="600" y2="438" stroke="#e3dccb" stroke-width="1.4" stroke-dasharray="3 4"></line>
  <rect x="468" y="336" width="130" height="102" rx="7" fill="#f6f1fb" opacity="0.7"></rect>
  <text x="531" y="368" font-size="21" text-anchor="middle">📓</text>
  <text x="531" y="392" font-size="13" font-weight="700" fill="#59437d" text-anchor="middle">Notebook</text>
  <text x="531" y="409" font-size="10.5" fill="#7a5ba6" text-anchor="middle">two-way traffic</text>
  <text x="669" y="368" font-size="21" text-anchor="middle">📚</text>
  <text x="669" y="392" font-size="13" font-weight="700" fill="#2e5d2e" text-anchor="middle">Library</text>
  <text x="669" y="409" font-size="10.5" fill="#5a8f5a" text-anchor="middle">collect &amp; read</text>
  
  <g class="lock"><text x="498" y="497" font-size="13" text-anchor="middle">🔒</text></g>
  <text x="600" y="497" font-size="11.5" fill="#8a8377" text-anchor="middle" dx="6">your machine — everything stays local</text>

  
  <g class="cf">
    <path d="M460 352 C 438 344, 416 340, 398 332" fill="none" stroke="#c0653f" stroke-width="3.4" stroke-linecap="round" marker-end="url(#arT)"></path>
    <path d="M398 396 C 416 400, 438 396, 460 392" fill="none" stroke="#c0653f" stroke-width="3.4" stroke-linecap="round" marker-end="url(#arT)"></path>
    <text x="429" y="368" font-size="11" font-weight="700" fill="#a8512f" text-anchor="middle">reads again</text>
    <text x="429" y="383" font-size="11" font-weight="700" fill="#a8512f" text-anchor="middle">writes back</text>
  </g>

  
  
  <g>
    <rect x="520" y="90" width="160" height="60" rx="14" fill="#fff" stroke="#e6e0d4" stroke-width="1.5"></rect>
    <circle cx="543" cy="120" r="12" fill="#eef3ea" stroke="#b5c9af"></circle><text x="543" y="125" font-size="12" font-weight="700" fill="#2e5d2e" text-anchor="middle">1</text>
    <text x="563" y="120" font-size="15" font-weight="700" fill="#243447">📚 Collect</text>
    <text x="600" y="170" font-size="11.5" fill="#8a8377" text-anchor="middle">PDF · Word · PPT · notes → one folder</text>
  </g>
  
  <g>
    <rect x="734" y="244" width="150" height="78" rx="14" fill="#fff" stroke="#b9cde4" stroke-width="1.5"></rect>
    <circle cx="757" cy="270" r="12" fill="#eaf0f7" stroke="#b9cde4"></circle><text x="757" y="275" font-size="12" font-weight="700" fill="#2c4a6e" text-anchor="middle">2</text>
    <text x="777" y="275" font-size="15" font-weight="700" fill="#243447">Process</text>
    <text x="809" y="298" font-size="11.5" fill="#8a8377" text-anchor="middle">Hybrid search + reranking</text>
    <text x="809" y="314" font-size="10.5" fill="#5a7ba6" text-anchor="middle">runs locally on your machine</text>
  </g>
  
  <g>
    <rect x="654" y="500" width="150" height="80" rx="14" fill="#fff" stroke="#e2c79f" stroke-width="1.5"></rect>
    <circle cx="677" cy="525" r="12" fill="#fdf3e7" stroke="#e2c79f"></circle><text x="677" y="530" font-size="12" font-weight="700" fill="#8a5a23" text-anchor="middle">3</text>
    <text x="697" y="530" font-size="15" font-weight="700" fill="#243447">Ask</text>
    <text x="729" y="552" font-size="11.5" fill="#8a8377" text-anchor="middle">in Claude or a local AI</text>
    <g><rect x="668" y="559" width="122" height="16" rx="8" fill="#fdf3e7" stroke="#e2c79f"></rect><text x="729" y="571" font-size="10" font-weight="600" fill="#a8512f" text-anchor="middle">⚓ answer with page citation</text></g>
  </g>
  
  <g>
    <rect x="392" y="500" width="172" height="80" rx="14" fill="#fff" stroke="#e6e0d4" stroke-width="1.5"></rect>
    <circle cx="415" cy="525" r="12" fill="#f6f1fb" stroke="#c9b8e0"></circle><text x="415" y="530" font-size="12" font-weight="700" fill="#59437d" text-anchor="middle">4</text>
    <text x="435" y="530" font-size="14" font-weight="700" fill="#243447">Think &amp; edit</text>
    <text x="478" y="552" font-size="11.5" fill="#8a8377" text-anchor="middle">brainstorm &amp; drafts</text>
    <text x="478" y="570" font-size="10.5" fill="#7a5ba6" text-anchor="middle">🧑 You + ✦ AI</text>
  </g>
  
  <g>
    <rect x="232" y="240" width="166" height="84" rx="14" fill="#fff" stroke="#c0653f" stroke-width="2"></rect>
    <circle cx="255" cy="266" r="12" fill="#f3d9cb" stroke="#c0653f"></circle><text x="255" y="271" font-size="12" font-weight="700" fill="#a8512f" text-anchor="middle">5</text>
    <text x="275" y="271" font-size="14.5" font-weight="700" fill="#243447">📓 Notebook</text>
    <text x="315" y="294" font-size="11.5" fill="#a8512f" font-weight="600" text-anchor="middle">in AND out</text>
    <text x="315" y="312" font-size="10.5" fill="#8a8377" text-anchor="middle">write back &amp; read again</text>
  </g>

  
  <path d="M1010 238 C 968 256, 928 270, 890 282" fill="none" stroke="#c7cedb" stroke-width="1.6" stroke-dasharray="5 5"></path>
  <g class="cloud">
    <g transform="translate(988,110) scale(1.42)">
      <path d="M105 90 H35 C15 90 5 78 5 62 C5 48 16 38 30 38 C32 22 46 10 63 10 C78 10 91 20 95 34 C110 35 122 46 122 60 C122 78 112 90 105 90 Z" fill="#f3f5f9" stroke="#c7cedb" stroke-width="1.3"></path>
    </g>
    <text x="1078" y="150" font-size="10.5" font-weight="700" letter-spacing="1.2" fill="#9aa0ad" text-anchor="middle">OPTIONAL · VIA MCP</text>
    <text x="1078" y="180" font-size="13" fill="#5f6b7e" text-anchor="middle">📅  Calendar</text>
    <text x="1078" y="206" font-size="13" fill="#5f6b7e" text-anchor="middle">✉️  Mail</text>
    <text x="1078" y="232" font-size="13" fill="#5f6b7e" text-anchor="middle">✅  Tasks</text>
  </g>

  <line x1="44" y1="604" x2="1156" y2="604" stroke="#eee8db" stroke-width="1"></line>
  <text x="44" y="624" font-size="12" fill="#b0a999">BRAG — Building Retrieval-Augmented Generation</text>
  <text x="1156" y="624" font-size="12" fill="#b0a999" font-family="Georgia,serif" font-style="italic" text-anchor="end">Chats forget — your knowledge store doesn’t.</text>
</svg>